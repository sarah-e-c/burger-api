AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Burger API - tracks burger contributions per user in DynamoDB

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref BurgerTable
    Layers:
      - !Ref BurgerDepsLayer
  Api:
    Auth:
      ApiKeyRequired: false

Resources:
  BurgerDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: burger-api-deps
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  BurgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: burger-counter
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  GetBurgerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.counter.get_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BurgerTable
      Events:
        GetBurger:
          Type: Api
          Properties:
            Path: /burger
            Method: get

  AddBurgerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.counter.increment_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BurgerTable
      Events:
        AddBurger:
          Type: Api
          Properties:
            Path: /burger
            Method: post
            Auth:
              ApiKeyRequired: true

  BurgerApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ServerlessRestApiProdStage
    Properties:
      Enabled: true
      StageKeys:
        - RestApiId: !Ref ServerlessRestApi
          StageName: Prod

  BurgerUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ServerlessRestApiProdStage
    Properties:
      ApiStages:
        - ApiId: !Ref ServerlessRestApi
          Stage: Prod

  BurgerUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref BurgerApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref BurgerUsagePlan

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  BurgerTableName:
    Description: DynamoDB table name
    Value: !Ref BurgerTable
  BurgerApiKeyId:
    Description: API Key ID (look up the value in API Gateway console)
    Value: !Ref BurgerApiKey
